<html>
    <head>
        <title>Table</title>
        <style>
        table, th, td {
        border: 2px solid black;
        border-collapse: separate;
        }
        </style>
    </head>
    <body>
        <table>
            <caption>Assingment 2 - Table</caption>
            <thead>
                <tr>
                <th>Item</th>
                <th>Quantity</th>
                <th>Unit Price</th>
                <th>Price</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Pencils</td>
                    <td>2</td>
                    <td>$1</td>
                    <td>$2</td>
                </tr>
                <tr>
                    <td>Erasers</td>
                    <td>4</td>
                    <td rowspan="2">$0.5</td>
                    <td>$2</td>
                </tr>
                <tr>
                    <td colspan="2">SubTotal</td>
                    <td>$4</td>
                </tr>
                <tr>
                    <td>Tax</td>
                    <td>10%</td>
                    <td colspan="2">$0.4</td>
                    
                </tr>
            </tbody>

            <tfoot>
                <tr>
                    <td colspan="4">Footer of the table</td>
                </tr>
            </tfoot>

        </table>
    </body>
</html>
